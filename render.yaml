services:
  - type: web
    name: finance-dashboard-api
    env: python
    buildCommand: pip install -r requirements.txt && python seed.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./finance.db
      - key: SECRET_KEY
        value: supersecretproductionkeychangethis123456
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30